<!DOCTYPE html>
<html>
<head>
    <title>3D射击游戏 - QR码</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            background: #222;
            color: white;
            text-align: center;
            font-family: Arial;
            padding: 20px;
        }
        .qr-container {
            background: #333;
            padding: 20px;
            border-radius: 10px;
            margin: 20px auto;
            max-width: 500px;
        }
        img {
            width: 300px;
            height: 300px;
            margin: 20px;
        }
        button {
            background: orange;
            color: black;
            padding: 12px;
            margin: 5px;
            border-radius: 8px;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <h1>🎮 3D射击游戏二维码</h1>
    <div class="qr-container">
        <p>扫描二维码在手机上访问游戏</p>
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=https://Null1Q84.github.io/3d-shooter-game/" alt="QR Code">
        <div>
            <button onclick="location.href='/index.html'">进入游戏</button>
            <button onclick="location.href='/mobile-shooter.html'">移动版本</button>
            <button onclick="location.href='/README.md'">查看文档</button>
        </div>
    </div>
</body>
</html>
